<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">

    <!-- ===================== SEO PRIMÁRIO (substituído dinamicamente pelo JS) ===================== -->
    <title>Produto | JSL Embalagens</title>
    <meta name="description" content="Confira detalhes, especificações, variantes e preços deste produto na JSL Embalagens. Entrega para todo o Brasil.">
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">
    <link rel="canonical" href="https://www.jslembalagens.com.br/produtos">

    <!-- ===================== OPEN GRAPH (substituído pelo JS) ===================== -->
    <meta property="og:locale" content="pt_BR">
    <meta property="og:type" content="product">
    <meta property="og:title" content="Produto | JSL Embalagens">
    <meta property="og:description" content="Detalhes do produto, variantes, preço e informações técnicas na JSL Embalagens.">
    <meta property="og:url" content="https://www.jslembalagens.com.br/produtos">
    <meta property="og:site_name" content="JSL Embalagens">
    <meta property="og:image" content="https://www.jslembalagens.com.br/img/imagemExemplo.jpg">
    <meta property="og:image:alt" content="Produto JSL Embalagens">

    <!-- ===================== TWITTER CARD ===================== -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Produto | JSL Embalagens">
    <meta name="twitter:description" content="Informações, preço e detalhes do produto na JSL Embalagens.">
    <meta name="twitter:image" content="https://www.jslembalagens.com.br/img/imagemExemplo.jpg">

    <!-- ===================== CSP ===================== -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'sha256-vvt4KWwuNr51XfE5m+hzeNEGhiOfZzG97ccfqGsPwvE=' https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com;
        font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com;
        img-src 'self' data: blob: https://otwmjdiqjhumqvyztnbl.supabase.co;
        connect-src 'self' https://otwmjdiqjhumqvyztnbl.supabase.co https://viacep.com.br https://cdn.jsdelivr.net;
        frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';
    ">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/produto-detalhe.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- JSON-LD do produto — preenchido dinamicamente pelo JS (atualizarJsonLdProduto) -->
    <script type="application/ld+json" id="produtoJsonLd">{}</script>

    <!-- BreadcrumbList estático — atualizado pelo JS quando produto carrega -->
    <script type="application/ld+json" id="breadcrumbJsonLd">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "Home",     "item": "https://www.jslembalagens.com.br/" },
            { "@type": "ListItem", "position": 2, "name": "Produtos", "item": "https://www.jslembalagens.com.br/produtos" },
            { "@type": "ListItem", "position": 3, "name": "Produto",  "item": "https://www.jslembalagens.com.br/produtos/" }
        ]
    }
    </script>

    <!-- Ativar rotas amigáveis -->
    <script>window.__JSL_ENABLE_FRIENDLY_ROUTES__ = true;</script>
</head>

<body>
    <div id="navbar-placeholder"></div>

    <div class="produto-loading" id="produtoLoading">
        <div class="spinner"></div>
        <p>Carregando produto...</p>
    </div>

    <div class="produto-erro" id="produtoErro" style="display:none">
        <i class="fa-solid fa-circle-exclamation"></i>
        <h2>Produto não encontrado</h2>
        <p>O produto que você está procurando não existe ou foi removido.</p>
        <a href="/produtos" class="btn-voltar">
            <i class="fa-solid fa-arrow-left"></i> Voltar aos produtos
        </a>
    </div>

    <main class="produto-detalhe" id="produtoDetalhe" style="display:none">

        <!-- Breadcrumb visível -->
        <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb">
            <a href="/">Home</a>
            <i class="fa-solid fa-chevron-right"></i>
            <a href="/produtos">Produtos</a>
            <i class="fa-solid fa-chevron-right"></i>
            <span id="breadcrumbNome">-</span>
        </nav>

        <section class="pd-topo">
            <div class="pd-galeria">
                <div class="pd-img-principal">
                    <img id="imgPrincipal" src="../img/imagemExemplo.jpg" alt="Produto JSL Embalagens" width="600" height="450">
                </div>
                <div class="pd-miniaturas" id="miniaturas"></div>
            </div>

            <div class="pd-info">
                <span class="pd-categoria" id="pdCategoria">Categoria</span>
                <h1 id="pdNome">Nome do Produto</h1>
                <p class="pd-descricao" id="pdDescricao">Descrição do produto.</p>
                <!-- demais elementos renderizados pelo JS -->
            </div>
        </section>

    </main>

    <a class="whatsapp-float" href="https://wa.me/5583996389725" aria-label="Falar no WhatsApp sobre este produto">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/produto-detalhe.js"></script>
    <script type="module" src="../js/main.js"></script>
</body>

</html>
