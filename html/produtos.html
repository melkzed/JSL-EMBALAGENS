<body>
    <div id="navbar-placeholder"></div>

    <!-- Breadcrumb visível -->
    <nav class="breadcrumb" aria-label="Breadcrumb" style="padding:0.75rem 1.5rem;font-size:0.85rem;">

        <span>Produtos</span>

    <section class="herop">
        <h1>Catálogo de Embalagens</h1>
        <p>Encontre a embalagem perfeita para o seu negócio — caixas, sacolas, delivery e descartáveis</p>
    </section>

    <section class="filtros-barra">
        <div class="busca-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="busca" placeholder="Buscar embalagem..." aria-label="Buscar produto">
        </div>
        <button class="btn-abrir-filtros" id="btnAbrirFiltros" aria-label="Abrir filtros">
            <i class="fa-solid fa-sliders"></i>
            Filtros
            <span class="filtros-ativos-badge" id="filtrosAtivosBadge" style="display:none">0</span>
        </button>
        <div class="ordenar-wrapper">
            <i class="fa-solid fa-arrow-up-wide-short"></i>
            <select id="ordenar" aria-label="Ordenar produtos">
                <option value="">Ordenar por</option>
                <option value="padrao">Ordem padrão</option>
                <option value="menor-preco">Menor preço</option>
                <option value="maior-preco">Maior preço</option>
                <option value="az">A → Z</option>
                <option value="za">Z → A</option>
            </select>
        </div>
    </section>

    <div class="filtros-overlay" id="filtrosOverlay"></div>
    <aside class="filtros-painel" id="filtrosPainel" aria-label="Painel de filtros">
        <div class="filtros-painel-header">
            <h2><i class="fa-solid fa-sliders"></i> Filtros</h2>
            <button class="btn-fechar-filtros" id="btnFecharFiltros" aria-label="Fechar filtros">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="filtro-grupo">
            <h3>Categoria</h3>
            <div class="categorias-filtro" id="categoriasFiltro">
                <button class="ativo" data-categoria="todas"><i class="fa-solid fa-border-all"></i> Todas</button>
            </div>
        </div>
        <div class="filtro-grupo">
            <h3>Faixa de preço <small>(por unidade)</small></h3>
            <div class="preco-range">
                <div class="preco-inputs">
                    <label><span>Mín. R$</span><input type="number" id="precoMin" min="0" step="0.01" placeholder="0,00"></label>
                    <span class="preco-separador">—</span>
                    <label><span>Máx. R$</span><input type="number" id="precoMax" min="0" step="0.01" placeholder="999,99"></label>
                </div>
                <div class="preco-atalhos">
                    <button data-min="0" data-max="0.5">Até R$ 0,50</button>
                    <button data-min="0.5" data-max="2">R$ 0,50 – R$ 2</button>
                    <button data-min="2" data-max="10">R$ 2 – R$ 10</button>
                    <button data-min="10" data-max="">Acima de R$ 10</button>
                </div>
            </div>
        </div>
        <div class="filtro-grupo">
            <h3>Disponibilidade</h3>
            <label class="filtro-checkbox">
                <input type="checkbox" id="apenasDisponiveis">
                <span>Apenas disponíveis</span>
            </label>
        </div>
        <div class="filtros-painel-footer">
            <button class="btn-limpar-filtros" id="btnLimparFiltros"><i class="fa-solid fa-rotate-left"></i> Limpar filtros</button>
            <button class="btn-aplicar-filtros" id="btnAplicarFiltros"><i class="fa-solid fa-check"></i> Aplicar</button>
        </div>
    </aside>

    <div class="filtros-tags-wrapper" id="filtrosTagsWrapper"></div>
    <div class="produtos-resultado-info" id="resultadoInfo"></div>

    <section class="produtos" aria-label="Lista de produtos">
