<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Retorno do Pagamento - JSL Embalagens</title>
    <script>
        const params = new URLSearchParams(window.location.search)
        const pedidoId = params.get('pedido')
        const isFriendlyHost = ['www.jslembalagens.com.br', 'jslembalagens.com.br'].includes(window.location.hostname)
        if (pedidoId) {
            window.location.href = isFriendlyHost ? '/perfil?tab=pedidos' : './html/perfil.html?tab=pedidos'
        } else {
            window.location.href = isFriendlyHost ? '/' : './index.html'
        }
    </script>
</head>
<body>
    <p>Processando retorno...</p>
</body>
</html>
