<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Retorno do Pagamento - JSL Embalagens</title>
    <script>
        const params = new URLSearchParams(window.location.search)
        const pedidoId = params.get('pedido')
        const host = window.location.hostname
        const path = decodeURIComponent(window.location.pathname).replace(/\\/g, '/')
        const isFriendlyHost =
            ['www.jslembalagens.com.br', 'jslembalagens.com.br'].includes(host) &&
            !path.includes('/html/') &&
            !path.endsWith('.html')
        if (pedidoId) {
            const pedidoSeguro = encodeURIComponent(pedidoId)
            window.location.href = isFriendlyHost
                ? `/perfil?tab=pedidos&pedido=${pedidoSeguro}`
                : `./html/perfil.html?tab=pedidos&pedido=${pedidoSeguro}`
        } else {
            window.location.href = isFriendlyHost ? '/' : './index.html'
        }
    </script>
</head>
<body>
    <p>Processando retorno...</p>
</body>
</html>
